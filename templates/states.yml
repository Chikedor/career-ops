# Career-Ops — Canonical States
# Source of truth for career-ops (writer) and dashboard (reader).
# Both systems MUST use these exact states.
#
# Rule: The status field in applications.md must contain EXACTLY
# one of these values (case-insensitive). No markdown bold (**),
# no dates, no extra text. Dates go in the date column.

states:
  - id: evaluated
    label: Evaluated
    aliases: [evaluada, condicional, hold, evaluar, verificar]
    description: Offer evaluated with report, pending decision
    dashboard_group: evaluated
    rank: 40
    actionable: true
    top_filter: true

  - id: applied
    label: Applied
    aliases: [aplicado, enviada, aplicada, applied, sent]
    description: Application submitted
    dashboard_group: applied
    rank: 30
    actionable: true
    top_filter: true

  - id: responded
    label: Responded
    aliases: [respondido]
    description: Company has responded (not yet interview)
    dashboard_group: responded
    rank: 20
    actionable: true
    top_filter: true

  - id: interview
    label: Interview
    aliases: [entrevista]
    description: Active interview process
    dashboard_group: interview
    rank: 10
    actionable: true
    top_filter: true

  - id: offer
    label: Offer
    aliases: [oferta]
    description: Offer received
    dashboard_group: offer
    rank: 0
    actionable: true
    top_filter: true

  - id: rejected
    label: Rejected
    aliases: [rechazado, rechazada]
    description: Rejected by company
    dashboard_group: rejected
    rank: 60
    actionable: false
    top_filter: false

  - id: discarded
    label: Discarded
    aliases: [descartado, descartada, cerrada, cancelada, duplicado, dup, repost]
    description: Discarded by candidate or offer closed
    dashboard_group: discarded
    rank: 70
    actionable: false
    top_filter: false

  - id: skip
    label: SKIP
    aliases: [no_aplicar, no aplicar, skip, monitor, geo blocker]
    description: Doesn't fit, don't apply
    dashboard_group: skip
    rank: 50
    actionable: false
    top_filter: false
